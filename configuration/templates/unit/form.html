{% extends "base.html" %}

{% block content %}

<div style="max-width: 760px;">
    <form method="post">
        {% csrf_token %}

        <div class="form-card">
            <div class="form-card-title">New Unit Creation</div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="uname">Unit name *</label>
                    <input type="text" id="uname" name="name" class="form-control" placeholder="e.g.: Grams, Liter, etc." required autofocus>
                    {% if form.name.errors %}
                        <span style="font-size: 11px; color: #A32D2D;">{{ form.name.errors.0 }}</span>
                    {% endif %}
                </div>

                <div class="form-group">
                    <label class="form-label" for="usymbol">Unit symbol *</label>
                    <input type="text" id="usymbol" name="symbol" class="form-control" placeholder="e.g.: g, Kg, L, etc." required autofocus>
                    {% if form.symbol.errors %}
                        <span style="font-size: 11px; color: #A32D2D;">{{ form.symbol.errors.0 }}</span>
                    {% endif %}
                </div>

                <div class="form-group">
                    <label class="form-label" for="utype">Unit type *</label>
                    <select id="utype" name="utype" class="form-control" required>
                        <option value="" disabled selected hidden>Select...</option>
                        {% for utype in type_list %}
                            <option value="{{ utype.id }}"
                                {% if oldValue.utype == utype.id|stringformat:"s" %}
                                    selected
                                {% endif %}>{{ utype.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="form-card">
            <div class="form-card-title">Convertion</div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="id_refUnit">Unit of reference</label>
                    <select id="id_refUnit" name="unit" class="form-control">
                        <option value="" selected>None</option>
                        {% for unit in unit_list %}
                            <option id="id_refUnit_{{ unit.id }}" value="{{ unit.id }}" data-name="{{ unit.name }}" data-symbol="{{ unit.symbol }}"
                                {% if oldValue.unit == unit.id|stringformat:"s" %}
                                    selected
                                {% endif %}>{{ unit.name }} ({{ unit.symbol }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="id_ratio">Ratio</label>
                    <input
                        type="number"
                        id="id_ratio"
                        name="ratio"
                        class="form-control"
                        placeholder="1.000"
                        step="1.000"
                        min="0.001"
                        value="{{ oldValue.ratio }}">
                    <span class="form-hint" id="id_txthelp_refunit">1 ref x ratio = 1 unit</span>
                </div>
            </div>
        </div>

        <div class="form-actions" style="border: none; padding-top: 0;">
            <a class="btn btn-secondary">
                Cancel
            </a>
            <button type="submit" class="btn btn-primary">Create</button>
        </div>
    </form>
</div>

<script>
    const new_unit_symb = document.getElementById("usymbol");
    const ref_unit = document.getElementById("id_refUnit");
    const ratio = document.getElementById("id_ratio");
    const txt_ref_unit = document.getElementById("id_txthelp_refunit");

    const ref_unit_data = ref_unit.options[ref_unit.selectedIndex];


    function txtHelperConvertGen() {
        if(ref_unit.value && ref_unit.value !== "None"){
            let ref_unit_option = document.getElementById(`id_refUnit_${ref_unit.value}`);
            let ratio_val = ratio.value || 1

            ratio.disabled = false;
            return `1 ${ref_unit_option.dataset.symbol} x ${ratio_val} = 1 ${new_unit_symb.value}`;
        }
        else{
            ratio.disabled = true;
            ratio.value = "";
            return 'Your unit is one of a kind';
        }
    }

    function updateConvertSpan() {
        txt_ref_unit.textContent = txtHelperConvertGen();
    }


    ref_unit.addEventListener("input", updateConvertSpan);
    ratio.addEventListener("input", updateConvertSpan);
    new_unit_symb.addEventListener("input", updateConvertSpan);

    updateConvertSpan();
</script>

{% endblock %}
